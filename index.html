<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promesario Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --deep-blue: #0f172a;
            --white: #ffffff;
            --whatsapp-green: #25D366;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            font-family: 'Inter', sans-serif;
            color: var(--white);
        }

        .card-container {
            perspective: 1000px;
            width: 320px;
            height: 450px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 20px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            border: 2px solid var(--gold);
            padding: 30px;
            text-align: center;
            box-sizing: border-box;
        }

        .card-front {
            background: var(--deep-blue);
        }

        .card-back {
            background: var(--white);
            color: var(--deep-blue);
            transform: rotateY(180deg);
        }

        .verse {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-style: italic;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .reference {
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-reset {
            background: var(--deep-blue);
            color: white;
        }

        .btn-share {
            background: var(--whatsapp-green);
            color: white;
        }
        
        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card-container" onclick="revelarPromesa()">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div style="font-size: 50px;">📜</div>
                <h2>Promesa del Día</h2>
                <p style="opacity: 0.7;">Haz clic para recibir tu palabra</p>
            </div>
            <div class="card-face card-back">
                <div id="promise-content">
                    <p class="verse" id="verse"></p>
                    <p class="reference" id="reference"></p>
                </div>
                <div class="btn-container">
                    <button class="btn-share" onclick="event.stopPropagation(); compartirWhatsApp()">Compartir en WhatsApp 📱</button>
                    <button class="btn-reset" onclick="event.stopPropagation(); resetear()">Otra promesa</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const promesas = [
            { v: "No temas, porque yo estoy contigo; no desmayes, porque yo soy tu Dios que te esfuerzo; siempre te ayudaré, siempre te sustentaré con la diestra de mi justicia.", r: "Isaías 41:10" },
            { v: "Pero los que esperan a Jehová tendrán nuevas fuerzas; levantarán alas como las águilas; correrán, y no se cansarán; caminarán, y no se fatigarán.", r: "Isaías 40:31" },
            { v: "Jehová peleará por vosotros, y vosotros estaréis tranquilos.", r: "Éxodo 14:14" },
            { v: "Todo lo puedo en Cristo que me fortalece.", r: "Filipenses 4:13" },
            { v: "Mas a Dios gracias, el cual nos da la victoria por medio de nuestro Señor Jesucristo.", r: "1 Corintios 15:57" },
            { v: "El Señor es mi luz y mi salvación; ¿de quién temeré? El Señor es la fortaleza de mi vida; ¿de quién he de atemorizarme?", r: "Salmos 27:1" },
            { v: "En el mundo tendréis aflicción; pero confiad, yo he vencido al mundo.", r: "Juan 16:33" },
            { v: "Dios es nuestro amparo y fortaleza, nuestro pronto auxilio en las tribulaciones.", r: "Salmos 46:1" },
            { v: "Y la paz de Dios, que sobrepasa todo entendimiento, guardará vuestros corazones y vuestros pensamientos en Cristo Jesús.", r: "Filipenses 4:7" },
            { v: "La paz os dejo, mi paz os doy; yo no os la doy como el mundo la da. No se turbe vuestro corazón, ni tenga miedo.", r: "Juan 14:27" },
            { v: "Deléitate asimismo en Jehová, y él te concederá las peticiones de tu corazón.", r: "Salmos 37:4" },
            { v: "Tú guardarás en completa paz a aquel cuyo pensamiento en ti persevera; porque en ti ha confiado.", r: "Isaías 26:3" },
            { v: "Echando toda vuestra ansiedad sobre él, porque él tiene cuidado de ustedes.", r: "1 Pedro 5:7" },
            { v: "No se inquieten por nada; más bien, en toda ocasión, con oración y ruego, presenten sus peticiones a Dios y denle gracias.", r: "Filipenses 4:6" },
            { v: "Confía en Jehová con todo tu corazón, y no te apoyes en tu propia prudencia.", r: "Proverbios 3:5" },
            { v: "El Señor guardará tu salida y tu entrada desde ahora y para siempre.", r: "Salmos 121:8" },
            { v: "Mi Dios, pues, suplirá todo lo que os falta conforme a sus riquezas en gloria en Cristo Jesús.", r: "Filipenses 4:19" },
            { v: "Y poderoso es Dios para hacer que abunde en vosotros toda gracia, a fin de que, teniendo siempre en todas las cosas todo lo suficiente, abundéis para toda buena obra.", r: "2 Corintios 9:8" },
            { v: "Jehová es mi pastor; nada me faltará.", r: "Salmos 23:1" },
            { v: "Mas buscad primeramente el reino de Dios y su justicia, y todas estas cosas os serán añadidas.", r: "Mateo 6:33" },
            { v: "Pidan, y se les dará; busquen, y encontrarán; llamen, y se les abrirá.", r: "Mateo 7:7" },
            { v: "Ciertamente el bien y la misericordia me seguirán todos los días de mi vida.", r: "Salmos 23:6" },
            { v: "Él es quien perdona todas tus iniquidades, El que sana todas tus dolencias.", r: "Salmos 103:3" },
            { v: "Porque de tal manera amó Dios al mundo, que ha dado a su Hijo unigénito, para que todo aquel que en él cree, no se pierda, mas tenga vida eterna.", r: "Juan 3:16" },
            { v: "El Señor es misericordioso y clemente, tardo para la ira y grande en misericordia.", r: "Salmos 103:8" },
            { v: "Mas Dios muestra su amor para con nosotros, en que siendo aún pecadores, Cristo murió por nosotros.", r: "Romanos 5:8" },
            { v: "Con amor eterno te he amado; por tanto, te prolongué mi misericordia.", r: "Jeremías 31:3" },
            { v: "Si confesamos nuestros pecados, él es fiel y justo para perdonar nuestros pecados, y limpiarnos de toda maldad.", r: "1 Juan 1:9" },
            { v: "Como el padre se compadece de los hijos, se compadece Jehová de los que le temen.", r: "Salmos 103:13" },
            { v: "He aquí que yo hago cosa nueva; pronto saldrá a luz; ¿no la conoceréis? Otra vez abriré camino en el desierto, y ríos en la soledad.", r: "Isaías 43:19" },
            { v: "Porque tú, Señor, eres bueno y perdonador, y grande en misericordia para con todos los que te invocan.", r: "Salmos 86:5" },
            { v: "Por la misericordia de Jehová no hemos sido consumidos, porque nunca decayeron sus misericordias. Nuevas son cada mañana; grande es tu fidelidad.", r: "Lamentaciones 3:22-23" },
            { v: "El que comenzó en vosotros la buena obra, la perfeccionará hasta el día de Jesucristo.", r: "Filipenses 1:6" },
            { v: "Tuya es, oh Jehová, la magnificencia y el poder, la gloria, la victoria y el honor; porque todas las cosas que están en los cielos y en la tierra son tuyas.", r: "1 Crónicas 29:11" },
            { v: "Y todo lo que pidiereis en oración, creyendo, lo recibiréis.", r: "Mateo 21:22" },
            { v: "Lámpara es a mis pies tu palabra, y lumbrera a mi camino.", r: "Salmos 119:105" },
            { v: "Instruye al niño en su camino, y aun cuando fuere viejo no se apartará de él.", r: "Proverbios 22:6" },
            { v: "Antes que clamen, responderé yo; mientras aún hablan, yo habré oído.", r: "Isaías 65:24" },
            { v: "El corazón del hombre piensa su camino; mas Jehová endereza sus pasos.", r: "Proverbios 16:9" },
            { v: "Te alabaré; porque formidables, maravillosas son tus obras; estoy maravillado, y mi alma lo sabe muy bien.", r: "Salmos 139:14" },
            { v: "No me elegisteis vosotros a mí, sino que yo os elegí a vosotros, y os he puesto para que vayáis y llevéis fruto.", r: "Juan 15:16" },
            { v: "Mirad cuál amor nos ha dado el Padre, para que seamos llamados hijos de Dios.", r: "1 Juan 3:1" },
            { v: "Porque somos hechura suya, creados en Cristo Jesús para buenas obras.", r: "Efesios 2:10" },
            { v: "Mas vosotros sois linaje escogido, real sacerdocio, nación santa, pueblo adquirido por Dios.", r: "1 Pedro 2:9" },
            { v: "El que habita al abrigo del Altísimo morará bajo la sombra del Omnipotente.", r: "Salmos 91:1" },
            { v: "No te sobrevendrá mal, ni plaga tocará tu morada. Pues a sus ángeles mandará acerca de ti, que te guarden en todos tus caminos.", r: "Salmos 91:10-11" },
            { v: "El ángel de Jehová acampa alrededor de los que le temen, y los defiende.", r: "Salmos 34:7" },
            { v: "Jehová te guardará de todo mal; él guardará tu alma.", r: "Salmos 121:7" },
            { v: "Aunque pase por el valle de sombra de muerte, no temeré mal alguno, porque tú estarás conmigo.", r: "Salmos 23:4" },
            { v: "Bendito el varón que confía en Jehová, y cuya confianza es Jehová. Porque será como el árbol plantado junto a las aguas.", r: "Jeremías 17:7-8" },
            { v: "La bendición de Jehová es la que enriquece, y no añade tristeza con ella.", r: "Proverbios 10:22" },
            { v: "Amado, yo deseo que tú seas prosperado en todas las cosas, y que tengas salud, así como prospera tu alma.", r: "3 Juan 1:2" },
            { v: "Toda buena dádiva y todo don perfecto desciende de lo alto, del Padre de las luces.", r: "Santiago 1:17" },
        ]

        function revelarPromesa() {
            const card = document.getElementById('card');
            if(!card.classList.contains('flipped')) {
                if (navigator.vibrate) navigator.vibrate(50);
                const random = promesas[Math.floor(Math.random() * promesas.length)];
                document.getElementById('verse').innerText = `"${random.v}"`;
                document.getElementById('reference').innerText = random.r;
                card.classList.add('flipped');
            }
        }

        function resetear() {
            const card = document.getElementById('card');
            card.classList.remove('flipped');
            setTimeout(() => {
                document.getElementById('verse').innerText = "";
                document.getElementById('reference').innerText = "";
            }, 400);
        }

        function compartirWhatsApp() {
            const verso = document.getElementById('verse').innerText;
            const referencia = document.getElementById('reference').innerText;
            const mensaje = `✨ *Promesa del Día* ✨%0A%0A${verso}%0A👉 _${referencia}_`;
            window.open(`https://api.whatsapp.com/send?text=${mensaje}`, '_blank');
        }
    </script>
</body>
